classifier:
  num_classes: 10
  learning_rate: 0.001
  batch_size: 128
  num_epochs: 200
  weight_decay: 0.0001
  model_name: "resnet18"
  num_workers: 4

data:
  dataset_name: "tomas-gajarsky/cifar10-lt"
  dataset_config: "r-20"
  num_classes: 10
  image_size: 32
  num_workers: 4
  pin_memory: true

training:
  seed: 42
  device: "cuda"
  gradient_clip_val: 0.0
  log_every_n_steps: 10
  save_every_n_epochs: 10
