diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: "linear"
  model_channels: 64
  num_residual_blocks: 2
  attention_resolutions: [8, 16]
  num_classes: 10
  class_embed_dim: 128
  learning_rate: 0.0001
  batch_size: 64
  num_epochs: 100
  num_samples_per_class: 500
  use_ema: true
  ema_decay: 0.9999

training:
  seed: 42
  device: "cuda"
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  save_every_n_epochs: 10
